<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Sorte - Estatísticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --mega: #209869;
            --quina: #260085;
            --lotofacil: #930089;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            color: #0f172a;
            margin-bottom: 4px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border-top: 5px solid #ccc;
        }

        .card.mega { border-top-color: var(--mega); }
        .card.quina { border-top-color: var(--quina); }
        .card.lotofacil { border-top-color: var(--lotofacil); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .mega .card-title { color: var(--mega); }
        .quina .card-title { color: var(--quina); }
        .lotofacil .card-title { color: var(--lotofacil); }

        .badge-concurso {
            background: #f1f5f9;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* O SEGREDO DO NOVO LAYOUT: Bolas compactas e elegantes */
        .dezenas-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .bola {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        .mega .bola { background: var(--mega); }
        .quina .bola { background: var(--quina); }
        .lotofacil .bola { background: var(--lotofacil); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .stat-item span {
            display: block;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .stat-item strong {
            color: #334155;
            font-size: 1rem;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Painel da Sorte 🍀</h1>
        <p>Estatísticas e Resultados Atualizados Diariamente</p>
    </header>

    <div id="erro" class="error-msg">Aguardando preenchimento dos dados do robô...</div>

    <div class="container" id="painel">
        <div class="card mega" id="card-megasena">
            <div class="card-header">
                <span class="card-title">Mega-Sena</span>
                <span class="badge-concurso" id="concurso-megasena">Concurso ---</span>
            </div>
            <div class="dezenas-grid" id="dezenas-megasena"></div>
            <div class="stats-grid">
                <div class="stat-item"><span>Média da Soma</span><strong id="soma-megasena">---</strong></div>
                <div class="stat-item"><span>Média de Pares</span><strong id="pares-megasena">---</strong></div>
            </div>
        </div>

        <div class="card quina" id="card-quina">
            <div class="card-header">
                <span class="card-title">Quina</span>
                <span class="badge-concurso" id="concurso-quina">Concurso ---</span>
            </div>
            <div class="dezenas-grid" id="dezenas-quina"></div>
            <div class="stats-grid">
                <div class="stat-item"><span>Média da Soma</span><strong id="soma-quina">---</strong></div>
                <div class="stat-item"><span>Média de Pares</span><strong id="pares-quina">---</strong></div>
            </div>
        </div>

        <div class="card lotofacil" id="card-lotofacil">
            <div class="card-header">
                <span class="card-title">Lotofácil</span>
                <span class="badge-concurso" id="concurso-lotofacil">Concurso ---</span>
            </div>
            <div class="dezenas-grid" id="dezenas-lotofacil"></div>
            <div class="stats-grid">
                <div class="stat-item"><span>Média da Soma</span><strong id="soma-lotofacil">---</strong></div>
                <div class="stat-item"><span>Média de Pares</span><strong id="pares-lotofacil">---</strong></div>
            </div>
        </div>
    </div>

    <script>
        async function carregarDados() {
            try {
                // Lê o arquivo de dados alimentado pelo robô
                const response = await fetch('dados.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error();
                const dados = await response.json();

                const loterias = ['megasena', 'quina', 'lotofacil'];

                loterias.forEach(loteria => {
                    const info = dados[loteria];
                    if (!info || !info.recentDraws || info.recentDraws.length === 0) return;

                    // Pega o último sorteio da lista
                    const ultimoSorteio = info.recentDraws[info.recentDraws.length - 1];

                    // Atualiza número do concurso e data
                    document.getElementById(`concurso-${loteria}`).innerText = `Nº ${ultimoSorteio.concurso} (${ultimoSorteio.data})`;

                    // Renderiza as bolas pequenas e elegantes
                    const grid = document.getElementById(`dezenas-${loteria}`);
                    grid.innerHTML = '';
                    ultimoSorteio.dezenas.forEach(num => {
                        const bola = document.createElement('div');
                        bola.className = 'bola';
                        bola.innerText = String(num).padStart(2, '0');
                        grid.appendChild(bola);
                    });

                    // Preenche as estatísticas básicas
                    document.getElementById(`soma-${loteria}`).innerText = info.somaMedia;
                    document.getElementById(`pares-${loteria}`).innerText = info.paresMedia;
                });

            } catch (err) {
                document.getElementById('erro').style.display = 'block';
                document.getElementById('painel').style.display = 'none';
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
